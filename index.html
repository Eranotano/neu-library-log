<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library | Visitor Sign-In</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --neu-green: #074a21; --scan-glow: #4ade80; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #074a21, #021a0b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            width: 100%;
            max-width: 950px;
            display: flex;
            border-radius: 25px;
            overflow: hidden;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            width: 35%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .neu-logo { width: 110px; margin-bottom: 15px; }
        .sidebar h2 { color: #074a21; font-weight: 800; }
        .sidebar p { font-size: 13px; color: #666; }
        .content { width: 65%; padding: 40px; color: white; }

        /* TOP ACTIONS */
        .top-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .google-btn {
            flex: 1;
            background: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }

        /* SCANNER STYLE WITH ANIMATION */
        .scan-box {
            flex: 1;
            background: #10b981;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border: 2px solid transparent;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* LASER LINE ANIMATION */
        @keyframes scan-line {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scan-box::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--scan-glow);
            box-shadow: 0 0 10px var(--scan-glow);
            animation: scan-line 2s linear infinite;
            display: none;
        }

        .scan-box:focus-within::after { display: block; }
        .scan-box:focus-within {
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* SUCCESS PULSE */
        @keyframes success-pulse {
            0% { box-shadow: 0 0 0 0px rgba(74, 222, 128, 0.7); }
            100% { box-shadow: 0 0 0 20px rgba(74, 222, 128, 0); }
        }
        .success-glow { animation: success-pulse 0.6s ease-out; }

        .scan-box input {
            background: transparent !important;
            color: white !important;
            font-weight: 600;
            border: none !important;
            outline: none !important;
            width: 100%;
            padding: 12px 5px;
            z-index: 1;
        }
        .scan-box input::placeholder { color: rgba(255,255,255,0.7); }

        /* FORM STYLES */
        .input-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 600; display: block; margin-bottom: 5px; opacity: 0.9; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: white;
            color: #333;
        }

        #submitBtn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #074a21;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }
        #submitBtn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        #adminBtn {
            display: none;
            width: 100%;
            background: #1f2937;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="main-card">
    <div class="sidebar">
        <img src="neu-logo.png" class="neu-logo" onerror="this.src='https://via.placeholder.com/120?text=NEU'">
        <h2>NEU LIBRARY</h2>
        <p>Visitor Management System</p>
    </div>

    <div class="content">
        <button id="adminBtn" onclick="window.location.href='admin.html'">Go to Admin Dashboard ⚙️</button>

        <div class="top-actions">
            <button id="googleLoginBtn" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
                <span id="loginText">Google Sign-in</span>
            </button>

            <div class="scan-box" id="scanVisual">
                <span style="font-size: 18px; margin-right: 5px; z-index: 1;">🔍</span>
                <input type="text" id="scannerInput" placeholder="Scan ID Here..." autofocus autocomplete="off">
            </div>
        </div>

        <hr style="opacity: 0.2; margin-bottom: 20px;">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter name or scan your ID">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>I am a:</label>
                <select id="userType">
                    <option>Student</option>
                    <option>Teacher</option>
                    <option>Staff</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>College</label>
                <select id="college">
                    <option>CAS</option>
                    <option>CBA</option>
                    <option>SEA</option>
                    <option>CICS</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Purpose of Visit</label>
            <select id="reason">
                <option>Reading</option>
                <option>Research</option>
                <option>Computer Use</option>
            </select>
        </div>

        <button id="submitBtn">CONFIRM SIGN IN</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFBZ7rZ-LyKuy0W0J6VjeT1auqAM7GMFM",
        authDomain: "neu-library-visitor-log-eb7d8.firebaseapp.com",
        projectId: "neu-library-visitor-log-eb7d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let userEmail = "";
    const adminEmail = "jcesperanza@neu.edu.ph";
    const myEmail = "erano.tano@neu.edu.ph";
    const scannerInput = document.getElementById("scannerInput");
    const scanVisual = document.getElementById("scanVisual");

    document.addEventListener("click", (e) => {
        if (e.target.tagName !== "INPUT" && e.target.tagName !== "SELECT" && e.target.tagName !== "BUTTON") {
            scannerInput.focus();
        }
    });

    onAuthStateChanged(auth, user => {
        if (user) {
            userEmail = user.email.toLowerCase();
            document.getElementById('loginText').innerText = "Hi, " + user.displayName.split(' ')[0];
            if (userEmail === adminEmail || userEmail === myEmail) {
                document.getElementById('adminBtn').style.display = "block";
            }
        }
    });

    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            if (!result.user.email.endsWith("@neu.edu.ph")) {
                await signOut(auth);
                Swal.fire('Error', 'Use NEU email only.', 'error');
            }
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    });

    async function handleSignIn() {
        const fullName = document.getElementById("fullName").value.trim();
        const userType = document.getElementById("userType").value;
        const college = document.getElementById("college").value;
        const reason = document.getElementById("reason").value;
        const scannedData = scannerInput.value.trim();

        if (!userEmail) {
            Swal.fire('Login First', 'Please sign in with Google', 'warning');
            return;
        }

        if (!fullName && !scannedData) {
            Swal.fire('Empty Field', 'Please scan ID or enter name', 'warning');
            return;
        }

        try {
            // Trigger Pulse Animation
            scanVisual.classList.add("success-glow");
            setTimeout(() => scanVisual.classList.remove("success-glow"), 600);

            await addDoc(collection(db, "visitors"), {
                email: userEmail,
                fullName: fullName || scannedData,
                scannedID: scannedData || "Manual",
                userType, college, reason,
                timestamp: serverTimestamp()
            });

            // Fast Toast Notification
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 2000,
                timerProgressBar: true
            });

            Toast.fire({
                icon: 'success',
                title: `Welcome, ${fullName || scannedData}!`
            });
            
            document.getElementById("fullName").value = "";
            scannerInput.value = "";
            scannerInput.focus();
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
    }

    document.getElementById("submitBtn").addEventListener("click", handleSignIn);
    scannerInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSignIn(); });
</script>

</body>
</html>
