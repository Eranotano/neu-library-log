<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library | Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
 --neu-green:#074a21;
 --neu-red:#ef4444;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Inter',sans-serif;
}

body{
 background: linear-gradient(135deg,#074a21,#021a0b);
 min-height:100vh;
 padding:20px;
}

/* LOADER */
#loader{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:9999;
}

.spinner{
 width:50px;
 height:50px;
 border:5px solid #eee;
 border-top:5px solid var(--neu-green);
 border-radius:50%;
 animation:spin 1s linear infinite;
}

@keyframes spin{
 0%{transform:rotate(0deg);}
 100%{transform:rotate(360deg);}
}

/* MAIN CARD */
.main-card{
 max-width:1250px;
 margin:auto;
 padding:30px;
 border-radius:25px;
 backdrop-filter: blur(20px);
 background: rgba(255,255,255,0.95);
 box-shadow:0 25px 60px rgba(0,0,0,0.4);
 display:none;
}

/* HEADER */
.header-flex{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:25px;
}

.logo-section{
 display:flex;
 align-items:center;
 gap:15px;
}

.neu-logo{
 width:60px;
}

h2{
 color:var(--neu-green);
 font-weight:800;
}

.btn-group {
    display: flex;
    gap: 10px;
}

.logout-btn{
 background:var(--neu-red);
 color:white;
 border:none;
 padding:10px 15px;
 border-radius:10px;
 cursor:pointer;
 font-weight: 600;
}

.export-btn {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

/* STATS */
.stats{
 display:grid;
 grid-template-columns: repeat(6,1fr);
 gap:15px;
 margin-bottom:25px;
}

.card{
 background:white;
 padding:20px;
 border-radius:15px;
 text-align:center;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 transition:0.2s;
 border-bottom: 4px solid var(--neu-green);
}

.card:hover{
 transform:translateY(-5px) scale(1.03);
}

.card span{
 font-size:24px;
 font-weight:800;
 color:var(--neu-green);
}

.card label{
 font-size:11px;
 color:#666;
 text-transform: uppercase;
 letter-spacing: 1px;
 font-weight: 600;
}

/* FILTERS */
.controls{
 background:#f1f5f9;
 padding:20px;
 border-radius:15px;
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:20px;
 align-items: flex-end;
}

.control-group{
 display:flex;
 flex-direction:column;
 flex: 1;
 min-width: 150px;
}

.control-group label {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 5px;
    color: #475569;
}

input,select{
 padding:10px;
 border-radius:10px;
 border: 1px solid #cbd5e1;
 outline: none;
}

input:focus, select:focus {
    border-color: var(--neu-green);
}

.filter-btn{
 background:var(--neu-green);
 color:white;
 border:none;
 padding:11px 25px;
 border-radius:10px;
 cursor:pointer;
 font-weight: 600;
}

/* TABLE */
.table-container{
 overflow-x:auto;
 border-radius: 15px;
 box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

table{
 width:100%;
 border-collapse:collapse;
 background: white;
}

th{
 background:var(--neu-green);
 color:white;
 padding:15px;
 text-align: left;
 font-size: 13px;
}

td{
 padding:12px 15px;
 border-bottom:1px solid #f1f5f9;
 font-size: 14px;
 color: #334155;
}

tr:hover td {
    background: #f8fafc;
}

.badge-scan {
    background: #dcfce7;
    color: #166534;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
}

.btn-delete{
 background:#fee2e2;
 color:#dc2626;
 border:none;
 padding:6px 12px;
 border-radius:6px;
 cursor:pointer;
 font-size: 12px;
 transition: 0.2s;
}

.btn-delete:hover{
 background:#f87171;
 color:white;
}

/* RESPONSIVE */
@media(max-width:1000px){
 .stats{grid-template-columns: repeat(3,1fr);}
}
@media(max-width:600px){
 .stats{grid-template-columns: repeat(2,1fr);}
 .controls { flex-direction: column; align-items: stretch; }
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:10px;color:#074a21;font-weight:600;">Verifying Admin Access...</p>
</div>

<div class="main-card" id="adminContent">

    <div class="header-flex">
        <div class="logo-section">
            <img src="neu-logo.png" class="neu-logo" onerror="this.src='https://via.placeholder.com/60?text=NEU'">
            <div>
                <h2>Admin Dashboard</h2>
                <p id="adminWelcome" style="font-size: 12px; color: #64748b;"></p>
            </div>
        </div>

        <div class="btn-group">
            <button class="export-btn" onclick="exportData()">📥 Export CSV</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="stats">
        <div class="card"><label>Today</label><span id="todayCount">0</span></div>
        <div class="card"><label>Reading</label><span id="readingCount">0</span></div>
        <div class="card"><label>Research</label><span id="researchCount">0</span></div>
        <div class="card"><label>Computer</label><span id="computerCount">0</span></div>
        <div class="card"><label>Employees</label><span id="employeeCount">0</span></div>
        <div class="card"><label>Total All-Time</label><span id="totalCount">0</span></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Search Name</label>
            <input id="searchInput" placeholder="Search visitor...">
        </div>

        <div class="control-group">
            <label>Purpose</label>
            <select id="filterReason">
                <option value="">All Purposes</option>
                <option>Reading</option>
                <option>Research</option>
                <option>Computer Use</option>
            </select>
        </div>

        <div class="control-group">
            <label>College</label>
            <select id="filterCollege">
                <option value="">All Colleges</option>
                <option>CAS</option>
                <option>CBA</option>
                <option>SEA</option>
                <option>CICS</option>
            </select>
        </div>

        <button class="filter-btn" onclick="applyFilters()">Apply Filters</button>
    </div>

    <div class="table-container">
        <table id="visitorTable">
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Full Name</th>
                    <th>Scanned ID</th>
                    <th>User Type</th>
                    <th>College</th>
                    <th>Purpose</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCFBZ7rZ-LyKuy0W0J6VjeT1auqAM7GMFM",
 authDomain:"neu-library-visitor-log-eb7d8.firebaseapp.com",
 projectId:"neu-library-visitor-log-eb7d8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allLogs=[];
const adminEmail="jcesperanza@neu.edu.ph";
const myEmail="erano.tano@neu.edu.ph";

onAuthStateChanged(auth,user=>{
 if(user && (user.email===adminEmail || user.email.toLowerCase()===myEmail)){
   document.getElementById('loader').style.display="none";
   document.getElementById('adminContent').style.display="block";
   document.getElementById('adminWelcome').innerText="Authorized: " + user.email;
 }else{
   window.location.href="index.html";
 }
});

onSnapshot(query(collection(db,"visitors"),orderBy("timestamp","desc")),snap=>{
 allLogs=[];
 snap.forEach(d=>allLogs.push({id:d.id,...d.data()}));
 applyFilters();
});

window.deleteRecord=async(id)=>{
 Swal.fire({
  title: 'Are you sure?',
  text: "You won't be able to revert this!",
  icon: 'warning',
  showCancelButton: true,
  confirmButtonColor: '#074a21',
  cancelButtonColor: '#d33',
  confirmButtonText: 'Yes, delete it!'
 }).then(async (result) => {
  if (result.isConfirmed) {
   await deleteDoc(doc(db,"visitors",id));
   Swal.fire('Deleted!', 'Record has been removed.', 'success');
  }
 });
};

function render(data){
 const tableBody = document.getElementById("tableBody");
 tableBody.innerHTML=data.map(v=>{
  const dateStr = v.timestamp?.toDate().toLocaleString() || "Pending...";
  const scanBadge = v.scannedID && v.scannedID !== "Manual" 
                    ? `<span class="badge-scan">${v.scannedID}</span>` 
                    : `<span style="color:#94a3b8">Manual</span>`;
  
  return `
  <tr>
   <td>${dateStr}</td>
   <td style="font-weight:600">${v.fullName}</td>
   <td>${scanBadge}</td>
   <td>${v.userType}</td>
   <td>${v.college}</td>
   <td>${v.reason}</td>
   <td><button class="btn-delete" onclick="deleteRecord('${v.id}')">Delete</button></td>
  </tr>`;
 }).join("");
}

function updateStats(data){
 const today = new Date().toDateString();
 
 document.getElementById('totalCount').innerText = data.length;
 document.getElementById('readingCount').innerText = data.filter(v=>v.reason.includes("Reading")).length;
 document.getElementById('researchCount').innerText = data.filter(v=>v.reason.includes("Research")).length;
 document.getElementById('computerCount').innerText = data.filter(v=>v.reason.includes("Computer")).length;
 document.getElementById('employeeCount').innerText = data.filter(v=>v.userType !== "Student").length;
 
 // Today's count logic
 const todayLogs = data.filter(v => v.timestamp?.toDate().toDateString() === today);
 document.getElementById('todayCount').innerText = todayLogs.length;
}

window.applyFilters=()=>{
 const s = document.getElementById("searchInput").value.toLowerCase();
 const r = document.getElementById("filterReason").value;
 const c = document.getElementById("filterCollege").value;

 const filtered = allLogs.filter(v=>
  (!s || v.fullName.toLowerCase().includes(s) || (v.scannedID && v.scannedID.toLowerCase().includes(s))) &&
  (!r || v.reason.includes(r)) &&
  (!c || v.college === c)
 );

 render(filtered);
 updateStats(filtered);
};

// EXPORT TO CSV FUNCTION
window.exportData = () => {
    if(allLogs.length === 0) return Swal.fire('No data', 'Nothing to export', 'info');
    
    let csv = "Date,Name,ScannedID,UserType,College,Purpose\n";
    allLogs.forEach(v => {
        csv += `${v.timestamp?.toDate().toLocaleString()},${v.fullName},${v.scannedID},${v.userType},${v.college},${v.reason}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('hidden', '');
    a.setAttribute('href', url);
    a.setAttribute('download', `NEU_Library_Logs_${new Date().toLocaleDateString()}.csv`);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
};

window.logout=async()=>{
 await signOut(auth);
 window.location.href="index.html";
};
</script>

</body>
</html>
