<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library Admin</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f7f6;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:white;
padding:15px 20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
flex-wrap:wrap;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:55px;
height:55px;
}

.logo-area h1{
font-size:18px;
color:#0c6b2f;
margin:0;
}

.logo-area p{
font-size:13px;
color:#555;
margin:0;
}

.exportBtn{
background:#0c6b2f;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.exportBtn:hover{
background:#095426;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.card span{
font-size:13px;
color:#777;
}

.card strong{
font-size:22px;
display:block;
margin-top:5px;
color:#0c6b2f;
}

/* SEARCH */

.controls{
margin-bottom:15px;
}

.controls input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

/* TABLE */

.table-container{
overflow-x:auto;
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

th{
background:#f9fafb;
text-align:left;
}

tr:hover{
background:#f6f6f6;
}

.deleteBtn{
background:#fee2e2;
color:red;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* MOBILE */

@media(max-width:768px){

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.exportBtn{
width:100%;
}

.card strong{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="logo-area">
<img src="neu-logo.png" class="logo">

<div>
<h1>New Era University</h1>
<p>Library Monitoring System – Admin Dashboard</p>
</div>

</div>

<button class="exportBtn" id="downloadPDF">
Export Visitor Report
</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<span>Visitors Today</span>
<strong id="todayCount">0</strong>
</div>

<div class="card">
<span>Reading</span>
<strong id="readingCount">0</strong>
</div>

<div class="card">
<span>Research</span>
<strong id="researchCount">0</strong>
</div>

<div class="card">
<span>Computer Use</span>
<strong id="computerCount">0</strong>
</div>

</div>

<!-- SEARCH -->

<div class="controls">
<input type="text" id="searchInput" placeholder="Search student name or ID">
</div>

<!-- TABLE -->

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Student ID</th>
<th>Name</th>
<th>Program</th>
<th>Purpose</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCFBZ7rZ-LyKuy0W0J6VjET1auqAM7GMFM",
authDomain: "neu-library-visitor-log-eb7d8.firebaseapp.com",
projectId: "neu-library-visitor-log-eb7d8",
storageBucket: "neu-library-visitor-log-eb7d8.appspot.com",
messagingSenderId: "168137481697",
appId: "1:168137481697:web:184188a3f657b79c2906a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allLogs = [];

onSnapshot(query(collection(db,"visitors"), orderBy("timestamp","desc")), snapshot => {

allLogs=[];

snapshot.forEach(d=>{
allLogs.push({id:d.id,...d.data()});
});

renderTable(allLogs);
updateStats(allLogs);

});

function renderTable(data){

const body=document.getElementById("tableBody");

body.innerHTML=data.map(v=>{

const date=v.timestamp? v.timestamp.toDate().toLocaleString():"";

return`

<tr>

<td>${date}</td>
<td>${v.studentId||""}</td>
<td>${v.fullName||""}</td>
<td>${v.program||""}</td>
<td>${v.reason||""}</td>

<td>
<button class="deleteBtn" onclick="deleteRecord('${v.id}')">
Delete
</button>
</td>

</tr>

`;

}).join("");

}

window.deleteRecord=async(id)=>{

const result=await Swal.fire({
title:"Delete this record?",
icon:"warning",
showCancelButton:true,
confirmButtonText:"Delete"
});

if(result.isConfirmed){

await deleteDoc(doc(db,"visitors",id));

}

};

function updateStats(data){

const today=new Date().toLocaleDateString();

const todayVisitors=data.filter(v=>
v.timestamp &&
v.timestamp.toDate().toLocaleDateString()===today
);

document.getElementById("todayCount").innerText=todayVisitors.length;

document.getElementById("readingCount").innerText=
data.filter(v=>v.reason==="Reading").length;

document.getElementById("researchCount").innerText=
data.filter(v=>v.reason==="Research").length;

document.getElementById("computerCount").innerText=
data.filter(v=>v.reason==="Use Computer").length;

}

document.getElementById("searchInput").addEventListener("input",e=>{

const keyword=e.target.value.toLowerCase();

const filtered=allLogs.filter(v=>

(v.fullName||"").toLowerCase().includes(keyword) ||

(v.studentId||"").toLowerCase().includes(keyword)

);

renderTable(filtered);

});

document.getElementById("downloadPDF").addEventListener("click",()=>{

const { jsPDF }=window.jspdf;

const pdf=new jsPDF();

pdf.text("New Era University Library Visitor Log Report",14,15);

const rows=allLogs.map(v=>[

v.timestamp? v.timestamp.toDate().toLocaleString():"",
v.studentId,
v.fullName,
v.program,
v.reason

]);

pdf.autoTable({
head:[["Date","Student ID","Name","Program","Purpose"]],
body:rows,
startY:20
});

pdf.save("NEU_Library_Report.pdf");

});

</script>

</body>
</html>
