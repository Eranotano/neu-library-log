<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Admin</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neu-green: #0c6b2f;
            --neu-green-hover: #084d22;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); padding: 2rem; }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header Section */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 { font-size: 1.5rem; color: var(--neu-green); font-weight: 700; letter-spacing: -0.5px; }
        .brand p { font-size: 0.85rem; color: var(--text-muted); }

        /* Stats Grid - Flat & Clean */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
        }

        .stat-card { 
            background: white; 
            padding: 1.5rem; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .stat-card span { font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }
        .stat-card strong { font-size: 1.75rem; color: var(--neu-green); margin-top: 0.5rem; }

        /* Controls Section */
        .controls { 
            background: white; 
            padding: 1rem; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            display: flex; 
            gap: 1rem; 
            margin-bottom: 1.5rem; 
            align-items: center;
        }

        #searchInput { 
            flex: 1; 
            padding: 0.6rem 1rem; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 0.9rem; 
            outline: none;
        }

        #searchInput:focus { border-color: var(--neu-green); }

        .btn-export { 
            background: var(--neu-green); 
            color: white; 
            padding: 0.6rem 1.2rem; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-export:hover { background: var(--neu-green-hover); }

        /* Table Section */
        .table-wrap { 
            background: white; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th { 
            background: #f1f5f9; 
            padding: 1rem; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td { padding: 1rem; font-size: 0.9rem; border-bottom: 1px solid #f8fafc; }

        tr:hover { background: #fdfdfd; }

        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-weight: 600;
            background: #f1f5f9;
            color: #475569;
        }

        .btn-del { 
            color: #ef4444; 
            background: none; 
            border: 1px solid #fee2e2; 
            padding: 0.4rem; 
            border-radius: 4px; 
            cursor: pointer; 
        }

        .btn-del:hover { background: #ef4444; color: white; border-color: #ef4444; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1>NEU Library Dashboard</h1>
            <p>Admin Control Panel</p>
        </div>
        <img src="neu-logo.png" alt="Logo" style="height: 50px;">
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span>Total Visitors</span><strong id="totalCount">0</strong></div>
        <div class="stat-card"><span>Reading</span><strong id="readingCount">0</strong></div>
        <div class="stat-card"><span>Research</span><strong id="researchCount">0</strong></div>
        <div class="stat-card"><span>Computer Use</span><strong id="computerCount">0</strong></div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by name, ID, or program...">
        <button class="btn-export" id="downloadPDF"><i class="fas fa-file-pdf"></i> Export to PDF</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Program</th>
                    <th>Reason</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFBZ7rZ-LyKuy0W0J6VjET1auqAM7GMFM",
        authDomain: "neu-library-visitor-log-eb7d8.firebaseapp.com",
        projectId: "neu-library-visitor-log-eb7d8",
        storageBucket: "neu-library-visitor-log-eb7d8.firebasestorage.app",
        messagingSenderId: "168137481697",
        appId: "1:168137481697:web:184188a3f657b79c2906a0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allLogs = [];

    onSnapshot(query(collection(db, "visitors"), orderBy("timestamp", "desc")), (snapshot) => {
        allLogs = [];
        snapshot.forEach(doc => allLogs.push({ id: doc.id, ...doc.data() }));
        renderData(allLogs);
        updateStats(allLogs);
    });

    window.deleteRecord = async (id) => {
        const result = await Swal.fire({
            title: 'Delete this record?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0c6b2f',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, delete'
        });
        if (result.isConfirmed) {
            await deleteDoc(doc(db, "visitors", id));
        }
    };

    function renderData(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = data.map(log => `
            <tr>
                <td style="color: var(--text-muted)">${log.timestamp ? log.timestamp.toDate().toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "---"}</td>
                <td><strong>${log.studentId || "N/A"}</strong></td>
                <td>${log.fullName}</td>
                <td>${log.program}</td>
                <td><span class="tag">${log.reason}</span></td>
                <td><button class="btn-del" onclick="deleteRecord('${log.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('');
    }

    function updateStats(data) {
        document.getElementById('totalCount').innerText = data.length;
        document.getElementById('readingCount').innerText = data.filter(l => l.reason === 'Reading').length;
        document.getElementById('researchCount').innerText = data.filter(l => l.reason === 'Research').length;
        document.getElementById('computerCount').innerText = data.filter(l => l.reason === 'Use Computer').length;
    }

    document.getElementById('downloadPDF').addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("NEU Library Visitor Logs", 14, 15);
        const tableData = allLogs.map(l => [
            l.timestamp ? l.timestamp.toDate().toLocaleString() : "",
            l.studentId || "N/A", l.fullName, l.program, l.reason
        ]);
        docPDF.autoTable({
            head: [['Date/Time', 'ID', 'Name', 'Program', 'Reason']],
            body: tableData,
            startY: 25,
            headStyles: { fillColor: [12, 107, 47] }
        });
        docPDF.save("NEU_Library_Logs.pdf");
    });
</script>
</body>
</html>
