<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEU Library | Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
 --neu-green:#074a21;
 --neu-red:#ef4444;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Inter',sans-serif;
}

body{
 background: linear-gradient(135deg,#074a21,#021a0b);
 min-height:100vh;
 padding:20px;
}

/* LOADER */
#loader{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:9999;
}

.spinner{
 width:50px;
 height:50px;
 border:5px solid #eee;
 border-top:5px solid var(--neu-green);
 border-radius:50%;
 animation:spin 1s linear infinite;
}

@keyframes spin{
 0%{transform:rotate(0deg);}
 100%{transform:rotate(360deg);}
}

/* MAIN CARD */
.main-card{
 max-width:1200px;
 margin:auto;
 padding:30px;
 border-radius:25px;
 backdrop-filter: blur(20px);
 background: rgba(255,255,255,0.95);
 box-shadow:0 25px 60px rgba(0,0,0,0.4);
 display:none;
}

/* HEADER */
.header-flex{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:25px;
}

.logo-section{
 display:flex;
 align-items:center;
 gap:15px;
}

.neu-logo{
 width:60px;
}

h2{
 color:var(--neu-green);
 font-weight:800;
}

.logout-btn{
 background:var(--neu-red);
 color:white;
 border:none;
 padding:10px 15px;
 border-radius:10px;
 cursor:pointer;
}

/* STATS */
.stats{
 display:grid;
 grid-template-columns: repeat(6,1fr);
 gap:15px;
 margin-bottom:25px;
}

.card{
 background:white;
 padding:20px;
 border-radius:15px;
 text-align:center;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 transition:0.2s;
}

.card:hover{
 transform:translateY(-5px) scale(1.03);
}

.card span{
 font-size:24px;
 font-weight:800;
 color:var(--neu-green);
}

.card label{
 font-size:11px;
 color:#666;
}

/* FILTERS */
.controls{
 background:#f1f5f9;
 padding:20px;
 border-radius:15px;
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 margin-bottom:20px;
}

.control-group{
 display:flex;
 flex-direction:column;
}

input,select{
 padding:10px;
 border-radius:10px;
 border:1px solid #ccc;
}

.filter-btn{
 background:var(--neu-green);
 color:white;
 border:none;
 padding:10px 20px;
 border-radius:10px;
 cursor:pointer;
}

/* TABLE */
.table-container{
 overflow-x:auto;
}

table{
 width:100%;
 border-collapse:collapse;
}

th{
 background:var(--neu-green);
 color:white;
 padding:12px;
}

td{
 padding:12px;
 background:#f9fafb;
 border-bottom:1px solid #eee;
}

.btn-delete{
 background:#fee2e2;
 color:#dc2626;
 border:none;
 padding:6px 12px;
 border-radius:6px;
 cursor:pointer;
}

.btn-delete:hover{
 background:#f87171;
 color:white;
}

/* RESPONSIVE */
@media(max-width:1000px){
 .stats{grid-template-columns: repeat(3,1fr);}
}
@media(max-width:600px){
 .stats{grid-template-columns: repeat(2,1fr);}
}
</style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:10px;color:#074a21;">Checking access...</p>
</div>

<div class="main-card" id="adminContent">

    <div class="header-flex">
        <div class="logo-section">
            <img src="neu-logo.png" class="neu-logo">
            <div>
                <h2>Admin Dashboard</h2>
                <p id="adminWelcome"></p>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="card"><label>Today</label><span id="todayCount">0</span></div>
        <div class="card"><label>Reading</label><span id="readingCount">0</span></div>
        <div class="card"><label>Research</label><span id="researchCount">0</span></div>
        <div class="card"><label>Computer</label><span id="computerCount">0</span></div>
        <div class="card"><label>Employees</label><span id="employeeCount">0</span></div>
        <div class="card"><label>Total</label><span id="totalCount">0</span></div>
    </div>

    <!-- FILTER -->
    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input id="searchInput">
        </div>

        <div class="control-group">
            <label>Purpose</label>
            <select id="filterReason">
                <option value="">All</option>
                <option>Reading</option>
                <option>Research</option>
                <option>Computer</option>
            </select>
        </div>

        <div class="control-group">
            <label>College</label>
            <select id="filterCollege">
                <option value="">All</option>
                <option>CAS</option>
                <option>CBA</option>
                <option>SEA</option>
                <option>CICS</option>
            </select>
        </div>

        <div class="control-group">
            <label>Start</label>
            <input type="date" id="startDate">
        </div>

        <div class="control-group">
            <label>End</label>
            <input type="date" id="endDate">
        </div>

        <button class="filter-btn" onclick="applyFilters()">Apply</button>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>College</th>
                    <th>Purpose</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
 apiKey:"AIzaSyCFBZ7rZ-LyKuy0W0J6VjeT1auqAM7GMFM",
 authDomain:"neu-library-visitor-log-eb7d8.firebaseapp.com",
 projectId:"neu-library-visitor-log-eb7d8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allLogs=[];
const adminEmail="jcesperanza@neu.edu.ph";
const myEmail="erano.tano@neu.edu.ph";

onAuthStateChanged(auth,user=>{
 if(user && (user.email===adminEmail || user.email===myEmail)){
   loader.style.display="none";
   adminContent.style.display="block";
   adminWelcome.innerText="Logged in: "+user.email;
 }else{
   window.location.href="index.html";
 }
});

onSnapshot(query(collection(db,"visitors"),orderBy("timestamp","desc")),snap=>{
 allLogs=[];
 snap.forEach(d=>allLogs.push({id:d.id,...d.data()}));
 applyFilters();
});

window.deleteRecord=async(id)=>{
 if(confirm("Delete record?")){
   await deleteDoc(doc(db,"visitors",id));
 }
};

function render(data){
 tableBody.innerHTML=data.map(v=>`
 <tr>
  <td>${v.timestamp?.toDate().toLocaleString()||"..."}</td>
  <td>${v.fullName}</td>
  <td>${v.userType}</td>
  <td>${v.college}</td>
  <td>${v.reason}</td>
  <td><button class="btn-delete" onclick="deleteRecord('${v.id}')">Delete</button></td>
 </tr>`).join("");
}

function updateStats(data){
 totalCount.innerText=data.length;
 readingCount.innerText=data.filter(v=>v.reason==="Reading").length;
 researchCount.innerText=data.filter(v=>v.reason==="Research").length;
 computerCount.innerText=data.filter(v=>v.reason==="Computer").length;
 employeeCount.innerText=data.filter(v=>v.isEmployee).length;
}

window.applyFilters=()=>{
 const s=searchInput.value.toLowerCase();
 const r=filterReason.value;
 const c=filterCollege.value;

 const filtered=allLogs.filter(v=>
 (!s||v.fullName.toLowerCase().includes(s)) &&
 (!r||v.reason===r) &&
 (!c||v.college===c)
 );

 render(filtered);
 updateStats(filtered);
};

window.logout=async()=>{
 await signOut(auth);
 window.location.href="index.html";
};
</script>

</body>
</html>
