<!DOCTYPE html>
<html>
<head>
    <title>NEU Library - Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#f4f7f6; padding: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #0c6b2f; font-weight: 800; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #0c6b2f; text-align: center; }
        .stat-card h3 { font-size: 14px; color: #777; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-size: 28px; font-weight: bold; color: #333; }

        .actions { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #searchInput { flex-grow: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        #searchInput:focus { border-color: #0c6b2f; }
        .btn-pdf { background: #d32f2f; color: white; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-pdf:hover { background: #b71c1c; }

        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0c6b2f; color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }
        tr:hover { background: #f9f9f9; }
        .no-data { text-align: center; padding: 40px; color: #999; }
        
        .btn-delete { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-delete:hover { background: #cc0000; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="header">
    <h1>NEU Library Dashboard</h1>
    <img src="neu-logo.png" alt="Logo" style="height: 50px;">
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Visitors</h3>
        <p id="totalCount">0</p>
    </div>
    <div class="stat-card">
        <h3>Reading</h3>
        <p id="readingCount">0</p>
    </div>
    <div class="stat-card">
        <h3>Research</h3>
        <p id="researchCount">0</p>
    </div>
    <div class="stat-card">
        <h3>Computer Use</h3>
        <p id="computerCount">0</p>
    </div>
</div>

<div class="actions">
    <input type="text" id="searchInput" placeholder="Search by name, program, or reason...">
    <button class="btn-pdf" id="downloadPDF">Export to PDF</button>
</div>

<div class="table-container">
    <table id="visitorTable">
        <thead>
            <tr>
                <th>Date & Time</th>
                <th>Full Name</th>
                <th>Institutional Email</th>
                <th>Program</th>
                <th>Reason</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="noDataMsg" class="no-data" style="display:none;">No records found.</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFBZ7rZ-LyKuy0W0J6VjET1auqAM7GMFM",
        authDomain: "neu-library-visitor-log-eb7d8.firebaseapp.com",
        projectId: "neu-library-visitor-log-eb7d8",
        storageBucket: "neu-library-visitor-log-eb7d8.firebasestorage.app",
        messagingSenderId: "168137481697",
        appId: "1:168137481697:web:184188a3f657b79c2906a0",
        measurementId: "G-1J342R3THN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allLogs = [];

    const q = query(collection(db, "visitors"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allLogs = [];
        snapshot.forEach(doc => {
            allLogs.push({ id: doc.id, ...doc.data() });
        });
        renderData(allLogs);
        updateStats(allLogs);
    });

    // Professional Delete Confirmation using SweetAlert2
    window.deleteRecord = async (id) => {
        Swal.fire({
            title: 'Are you sure?',
            text: "Do you want to delete this record? This action cannot be undone.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0c6b2f',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Yes, delete it!',
            cancelButtonText: 'Cancel'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "visitors", id));
                    Swal.fire({
                        title: 'Deleted!',
                        text: 'The record has been successfully removed.',
                        icon: 'success',
                        confirmButtonColor: '#0c6b2f'
                    });
                } catch (error) {
                    Swal.fire('Error!', 'Failed to delete record.', 'error');
                }
            }
        });
    };

    function renderData(data) {
        const tableBody = document.getElementById('tableBody');
        const noDataMsg = document.getElementById('noDataMsg');
        tableBody.innerHTML = "";

        if (data.length === 0) {
            noDataMsg.style.display = "block";
            return;
        }
        noDataMsg.style.display = "none";

        data.forEach(log => {
            const date = log.timestamp ? log.timestamp.toDate().toLocaleString() : "Pending...";
            const row = `<tr>
                <td>${date}</td>
                <td>${log.fullName}</td>
                <td>${log.email}</td>
                <td>${log.program}</td>
                <td>${log.reason}</td>
                <td>
                    <button class="btn-delete" onclick="deleteRecord('${log.id}')">Delete</button>
                </td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function updateStats(data) {
        document.getElementById('totalCount').innerText = data.length;
        document.getElementById('readingCount').innerText = data.filter(l => l.reason === 'Reading').length;
        document.getElementById('researchCount').innerText = data.filter(l => l.reason === 'Research').length;
        document.getElementById('computerCount').innerText = data.filter(l => l.reason === 'Use Computer').length;
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allLogs.filter(log => 
            log.fullName.toLowerCase().includes(term) || 
            log.program.toLowerCase().includes(term) || 
            log.reason.toLowerCase().includes(term)
        );
        renderData(filtered);
    });

    document.getElementById('downloadPDF').addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("NEU Library Visitor Log Report", 14, 15);
        docPDF.setFontSize(10);
        docPDF.text("Generated on: " + new Date().toLocaleString(), 14, 22);
        const tableData = [];
        const rows = document.querySelectorAll("#tableBody tr");
        rows.forEach(row => {
            const cols = row.querySelectorAll("td");
            tableData.push([cols[0].innerText, cols[1].innerText, cols[3].innerText, cols[4].innerText]);
        });
        docPDF.autoTable({
            head: [['Date/Time', 'Name', 'Program', 'Reason']],
            body: tableData,
            startY: 30,
            theme: 'grid',
            headStyles: { fillColor: [12, 107, 47] }
        });
        docPDF.save("NEU_Library_Logs.pdf");
    });
</script>
</body>
</html>
